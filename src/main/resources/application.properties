# Application
spring.application.name=authservice
server.port=8080
server.servlet.context-path=/

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/authservice_db
spring.datasource.username=authservice_user
spring.datasource.password=authservice_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly12345
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.studyconnetct.authservice=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Server Configuration
server.error.include-message=always
server.error.include-binding-errors=always
