services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: authservice-postgres
    environment:
      POSTGRES_USER: authservice_user
      POSTGRES_PASSWORD: authservice_password
      POSTGRES_DB: authservice_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authservice_user -d authservice_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - authservice-network
    restart: unless-stopped

  # Auth Service
  authservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authservice-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authservice_db
      SPRING_DATASOURCE_USERNAME: authservice_user
      SPRING_DATASOURCE_PASSWORD: authservice_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
      JWT_SECRET: mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly12345
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - authservice-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  authservice-network:
    driver: bridge
